apiVersion: v1
kind: ConfigMap
metadata:
  name: progress-reconciler-config
  namespace: progress-reconciler
  labels:
    app: progress-reconciler
data:
  config.yaml: |
    reconciliation_interval: 5s
    report_min_interval: 15s
    startup_grace_period: 30s
    supabase_url: "https://hsnxzbyedgzepraxwpar.supabase.co/functions/v1/report-progress"
    retry_max_attempts: 3
    retry_backoff_initial: 1s

    riddles:
      - riddle_id: "2eecc00a-79a6-4d8e-92a3-06440b5d08c2"
        namespace: "riddle-1"
        enabled: true
        description: "Cluster Debugging"
        total_checks: 10

      - riddle_id: "24e96064-68d7-4bf9-b222-af29fe2306be"
        namespace: "riddle-2"
        enabled: true
        description: "Scaling Under Pressure"
        total_checks: 5

      - riddle_id: "7d7c5ea7-9b3d-4890-ac40-c79b8f30c778"
        namespace: "riddle-3"
        enabled: true
        description: "The Slow Burn"
        total_checks: 5