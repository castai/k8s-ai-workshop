name: Build progress-reconciler

on:
  push:
    branches: [main]
    paths:
      - "progress-reconciler/**"
      - ".github/workflows/progress-reconciler.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/progress-reconciler

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: progress-reconciler
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: progress-reconciler/go.sum

      - name: Build binaries
        run: |
          cd progress-reconciler
          GOOS=linux GOARCH=amd64 go build -o reconciler_linux_amd64 ./cmd/reconciler
          GOOS=linux GOARCH=arm64 go build -o reconciler_linux_arm64 ./cmd/reconciler

      - name: Move verifier-latest tag
        run: |
          git tag -f verifier-latest
          git push origin -f verifier-latest

      - name: Publish as rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: verifier-latest
          name: Verifier (latest)
          body: "Pre-built verifier binaries — updated on every push to main."
          prerelease: true
          make_latest: false
          files: |
            progress-reconciler/reconciler_linux_amd64
            progress-reconciler/reconciler_linux_arm64
