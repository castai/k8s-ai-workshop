# =============================================================================
# Riddle 2: Load generator
#
# Drives continuous HTTP traffic to web-frontend and order-service,
# creating CPU pressure that the services can't handle without HPAs.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: riddle-2
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-frontend
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Generating load on web-frontend..."
              while true; do
                wget -q -O- http://web-frontend > /dev/null 2>&1
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        - name: load-orders
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Generating load on order-service..."
              while true; do
                wget -q -O- http://order-service > /dev/null 2>&1
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
