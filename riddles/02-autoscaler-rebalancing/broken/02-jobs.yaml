# =============================================================================
# Riddle 2: Temporary jobs that force autoscaler to add extra nodes
#
# These jobs run for ~60 seconds then complete, leaving the cluster with
# excess nodes that the rebalancer can consolidate.
#
# Total temporary: ~23 CPU / ~22Gi across 8 pods
# Per-job podAntiAffinity prevents same-job pods from co-locating,
# and 3 CPU requests prevent too much cross-job co-location on small nodes,
# forcing the autoscaler to provision 4+ extra nodes.
# =============================================================================

# --- Data Migration Job: 3 pods x 3 CPU / 3Gi, 60s ---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-migration
  namespace: riddle-2
  labels:
    app: data-migration
    type: temporary
spec:
  parallelism: 3
  completions: 3
  template:
    metadata:
      labels:
        app: data-migration
        type: temporary
    spec:
      restartPolicy: Never
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: data-migration
              topologyKey: kubernetes.io/hostname
      containers:
        - name: migration
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Running data migration...'; sleep 60; echo 'Migration complete'"]
          resources:
            requests:
              cpu: "3"
              memory: "3Gi"
            limits:
              cpu: "3"
              memory: "3Gi"

---
