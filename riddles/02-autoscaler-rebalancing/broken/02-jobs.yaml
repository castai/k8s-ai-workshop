---
# --- Cache Warmup Job: 2 pods x 2.5 CPU / 2Gi, 60s ---
apiVersion: batch/v1
kind: Job
metadata:
  name: cache-warmup
  namespace: riddle-2
  labels:
    app: cache-warmup
    type: temporary
spec:
  parallelism: 2
  completions: 2
  template:
    metadata:
      labels:
        app: cache-warmup
        type: temporary
    spec:
      restartPolicy: Never
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: cache-warmup
              topologyKey: kubernetes.io/hostname
      containers:
        - name: warmup
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Warming up caches...'; sleep 60; echo 'Cache warmup complete'"]
          resources:
            requests:
              cpu: "2500m"
              memory: "2Gi"
            limits:
              cpu: "2500m"
              memory: "2Gi"
