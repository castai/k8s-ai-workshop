# =============================================================================
# Riddle 2: Persistent microservices (small footprint)
#
# These are the "real" workloads that remain after temporary jobs complete.
# Total persistent: ~1 CPU / ~1.2Gi - fits on 2 nodes comfortably.
# After jobs finish, the cluster will have 6+ nodes but only need 2-3
# for these workloads, creating waste that the rebalancer can optimize.
# =============================================================================

# --- Web Frontend: 2 replicas x 200m / 256Mi ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: riddle-2
  labels:
    app: web-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
        tier: frontend
    spec:
      containers:
        - name: web-frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: riddle-2
spec:
  selector:
    app: web-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-frontend-pdb
  namespace: riddle-2
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-frontend

