apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-sa
  namespace: riddle-1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inventory-configmap-reader
  namespace: riddle-1
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inventory-configmap-binding
  namespace: riddle-1
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inventory-configmap-reader
subjects:
  - kind: ServiceAccount
    name: inventory-service-sa
    namespace: riddle-1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-config
  namespace: riddle-1
data:
  DATABASE_HOST: "cache-service.riddle-1.svc.cluster.local"
  DATABASE_PORT: "6379"
  LOG_LEVEL: "info"
  MAX_RETRIES: "3"
  INVENTORY_MODE: "realtime"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: riddle-1
  labels:
    app: inventory-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: backend
    spec:
      serviceAccountName: inventory-sa
      initContainers:
        - name: load-config
          image: bitnami/kubectl:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Attempting to load configuration from ConfigMap..."
              CONFIG=$(kubectl get configmap inventory-config -n riddle-1 -o jsonpath='{.data}' 2>&1)
              EXIT_CODE=$?
              if [ $EXIT_CODE -ne 0 ]; then
                echo "ERROR: Failed to read configmap inventory-config: $CONFIG"
                echo "The inventory service cannot start without its configuration."
                echo "Please ensure the configmap 'inventory-config' exists and is accessible."
                exit 1
              fi
              echo "Configuration loaded successfully"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: inventory
          image: nginx:alpine
          command: ["sh", "-c"]
          args:
            - |
              cat > /etc/nginx/conf.d/default.conf << 'CONF'
              server {
                  listen 8080;
                  location / { return 200 'healthy\n'; }
                  location /health { return 200 'healthy\n'; }
              }
              CONF
              nginx -g 'daemon off;'
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: riddle-1
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8080
      targetPort: 8080
