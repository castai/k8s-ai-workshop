apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: riddle-1
  labels:
    app: payment-processor
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
        tier: backend
    spec:
      # This pod must run on a node labeled for processing workloads
      nodeSelector:
        workload-type: processing
      # Toleration for the dedicated processing node taint
      tolerations:
        - key: "processing"
          operator: "Equal"
          value: "dedicated"
          effect: "NoExecute"
      containers:
        - name: payment
          image: nginx:alpine
          ports:
            - containerPort: 8080
          command: ["sh", "-c"]
          args:
            - |
              cat > /etc/nginx/conf.d/default.conf << 'CONF'
              server {
                  listen 8080;
                  location / { return 200 'payment-processor: OK\n'; }
                  location /health { return 200 'healthy\n'; }
              }
              CONF
              nginx -g 'daemon off;'
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor-svc
  namespace: riddle-1
spec:
  selector:
    app: payment-processor
  ports:
    - port: 8080
      targetPort: 8080
