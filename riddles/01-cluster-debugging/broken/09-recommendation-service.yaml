apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: riddle-1
  labels:
    app: recommendation-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
        tier: backend
    spec:
      containers:
        - name: recommendation
          image: nginx:alpine
          ports:
            - containerPort: 8080
          command: ["sh", "-c"]
          args:
            - |
              cat > /etc/nginx/conf.d/default.conf << 'CONF'
              server {
                  listen 8080;
                  location = / { return 200 'recommendation-service: OK\n'; }
                  location = /health { return 200 'healthy\n'; }
              }
              CONF
              nginx -g 'daemon off;'
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: riddle-1
spec:
  selector:
    app: recommendation-service
  ports:
    - port: 8080
      targetPort: 8080
