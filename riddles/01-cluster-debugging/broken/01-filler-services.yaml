apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  namespace: riddle-1
  labels:
    app: cache-service
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-service
  template:
    metadata:
      labels:
        app: cache-service
        tier: infrastructure
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "300m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cache-service
  namespace: riddle-1
spec:
  selector:
    app: cache-service
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: riddle-1
  labels:
    app: config-service
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
        tier: infrastructure
    spec:
      containers:
        - name: config
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "300m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: riddle-1
spec:
  selector:
    app: config-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-service
  namespace: riddle-1
  labels:
    app: logging-service
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logging-service
  template:
    metadata:
      labels:
        app: logging-service
        tier: infrastructure
    spec:
      containers:
        - name: logger
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo \"[$(date)] log-collector running\"; sleep 30; done"]
          resources:
            requests:
              cpu: "300m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: logging-service
  namespace: riddle-1
spec:
  selector:
    app: logging-service
  ports:
    - port: 5140
      targetPort: 5140
