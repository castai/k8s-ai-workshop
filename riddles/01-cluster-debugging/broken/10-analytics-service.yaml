apiVersion: v1
kind: Secret
metadata:
  name: analytics-credentials
  namespace: riddle-1
type: Opaque
stringData:
  api-key: "sk-analytics-prod-x8k2m9v4"
  endpoint: "https://analytics.internal.shopflow.io"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: riddle-1
  labels:
    app: analytics-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        tier: backend
    spec:
      containers:
        - name: analytics
          image: nginx:alpine
          ports:
            - containerPort: 8080
          env:
            - name: ANALYTICS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-credentials
                  key: API_KEY
            - name: ANALYTICS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: analytics-credentials
                  key: endpoint
          command: ["sh", "-c"]
          args:
            - |
              cat > /etc/nginx/conf.d/default.conf << 'CONF'
              server {
                  listen 8080;
                  location / { return 200 'analytics-service: OK\n'; }
                  location /health { return 200 'healthy\n'; }
              }
              CONF
              nginx -g 'daemon off;'
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: riddle-1
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8080
      targetPort: 8080
