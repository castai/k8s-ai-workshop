# =============================================================================
# Riddle 2: E-commerce platform services
#
# These services are deployed and running fine at low traffic.
# The load-generator (separate manifest) will start driving traffic,
# revealing that there is no autoscaling, no PDBs, and no topology spread.
#
# Issues participants must fix:
#   1. CPU requests are too low (10m) — HPA math will be broken
#   2. No HPAs exist — services can't scale under load
#   3. No PodDisruptionBudgets — scale-down could kill all replicas
#   4. No topology spread — all replicas land on same node
# =============================================================================

# --- Web Frontend: 1 replica, handles incoming traffic ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: riddle-2
  labels:
    app: web-frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
        tier: frontend
    spec:
      containers:
        - name: web-frontend
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"       # Too low! Actual usage under load is ~200-400m
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: riddle-2
spec:
  selector:
    app: web-frontend
  ports:
    - port: 80
      targetPort: 80

---
